name: Update Market Breadth Chart

on:
  schedule:
    # 10:35 UTC = 17:35 Vietnam time (ICT = UTC+7), Mon–Fri
    - cron: '35 10 * * 1-5'
  workflow_dispatch:   # allow manual "Run workflow" from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate chart HTML
        run: python market_breadth.py --no-browser

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github,cache,__pycache__,*.py,*.bat,*.pkl,*.csv,requirements.txt'
